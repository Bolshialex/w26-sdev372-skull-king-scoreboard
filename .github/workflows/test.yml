name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Test Image
        run: docker build -t test-container -f dockerTest .

      - name: Run Backend Unit Tests
        run: docker run --rm test-container sh -c "cd backEnd && npm run test:unit"

      - name: Run Frontend Unit Tests
        run: docker run --rm test-container sh -c "cd frontEnd && npm run test:unit"

      - name: Run Integration Tests
        run: docker run --rm test-container sh -c "cd frontEnd && npm run test:integration"

      - name: Run E2E Tests
        run: docker run --rm test-container sh -c "npx playwright test"
